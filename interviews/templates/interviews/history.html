{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview History - JobView</title>
    <link rel="stylesheet" href="{% static 'css/history.css' %}">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3>CareerConnect AI</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'users:user_dashboard' %}" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="{% url 'application:applied_companies' %}" class="nav-item">
                    <span class="icon">🏢</span> Applied Companies
                </a>
                <a href="{% url 'application:apply_companies' %}" class="nav-item">
                    <span class="icon">📝</span> Apply to Companies
                </a>
                <a href="{% url 'interviews:start_interview' %}" class="nav-item">
                    <span class="icon">🎤</span> Interview AI
                </a>
                <a href="{% url 'interviews:interview_history' %}" class="nav-item active">
                    <span class="icon">📜</span> History of AI
                </a>
            </nav>
            <div class="sidebar-footer">
                <form method="post" action="{% url 'users:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">
                        <span>🚪 Logout</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>History of AI</h1>
            </div>
            <div class="placeholder-content">
                <h2>Welcome to Interview History</h2>
                <p>This page will show your previous AI interview sessions and feedback.</p>
            </div>
        </main>
    </div>
</body>
</html>
