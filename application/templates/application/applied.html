{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applied Companies - JobView</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        .dashboard-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #333333;
        }

        .sidebar-brand {
            margin-bottom: 40px;
        }

        .sidebar-brand h3 {
            font-size: 26px;
            color: #fff;
            font-weight: 600;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            text-decoration: none;
            color: #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-item:hover {
            background-color: #2563eb;
            color: #fff;
        }

        .nav-item.active {
            background-color: #2563eb;
            color: white;
        }

        .nav-item .icon {
            margin-right: 10px;
            font-size: 16px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #333333;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
            font-weight: 500;
        }

        .logout-btn:hover {
            background-color: #333333;
            text-decoration: none;
            color: white;
        }

        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #0a0a0a;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            color: #ffffff;
        }

        .placeholder-content {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid #333333;
        }

        .placeholder-content h2 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .placeholder-content p {
            color: #a0a0a0;
            line-height: 1.6;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
            }

            .sidebar-nav {
                display: flex;
                gap: 10px;
                flex: 1;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3>CareerConnect AI</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'users:user_dashboard' %}" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="{% url 'application:applied_companies' %}" class="nav-item active">
                    <span class="icon">🏢</span> Applied Companies
                </a>
                <a href="{% url 'application:apply_companies' %}" class="nav-item">
                    <span class="icon">📝</span> Apply to Companies
                </a>
                <a href="{% url 'interviews:start_interview' %}" class="nav-item">
                    <span class="icon">🎤</span> Interview AI
                </a>
                <a href="{% url 'interviews:interview_history' %}" class="nav-item">
                    <span class="icon">📜</span> History of AI
                </a>
            </nav>
            <div class="sidebar-footer">
                <form method="post" action="{% url 'users:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">
                        <span>🚪 Logout</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Applied Companies</h1>
            </div>
            <div class="placeholder-content">
                <h2>Welcome to Applied Companies</h2>
                <p>This page will show all companies where you have applied for jobs.</p>
            </div>
        </main>
    </div>
</body>
</html>
