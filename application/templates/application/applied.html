{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applied Companies - JobView</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: #f5f7fa;
            color: #2c3e50;
            display: flex;
            min-height: 100vh;
        }

        .dashboard-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #ffffff;
            color: #2c3e50;
            padding: 20px 0 0 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e1e8ed;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar-brand {
            margin-bottom: 40px;
        }

        .sidebar-brand h3 {
            font-size: 20px;
            color: #2c3e50;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Playfair Display', serif;
        }

        .nav-item:hover {
            background-color: #f0f4f8;
            color: #2563eb;
        }

        .nav-item.active {
            background-color: #2563eb;
            color: white;
        }

        .nav-item .icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            padding-right: 0;
            padding-bottom: 0;
            padding-left: 0;
            border-top: 1px solid #e1e8ed;
            margin-left: -20px;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 0;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 250px;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn:hover {
            background-color: #1a1a1a;
            text-decoration: none;
            color: white;
        }

        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #f5f7fa;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            color: #2c3e50;
        }

        .placeholder-content {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid #e1e8ed;
        }

        .placeholder-content h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .placeholder-content p {
            color: #5a5a5a;
            line-height: 1.6;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
            }

            .sidebar-nav {
                display: flex;
                gap: 10px;
                flex: 1;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3 style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.025em; color: #2c3e50;"><i class="fas fa-briefcase"></i> CAREERCONNECT AI</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'users:user_dashboard' %}" class="nav-item" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="{% url 'application:applied_companies' %}" class="nav-item active" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <i class="fas fa-building"></i> Applied Companies
                </a>
                <a href="{% url 'application:apply_companies' %}" class="nav-item" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <i class="fas fa-paper-plane"></i> Apply to Companies
                </a>
                <a href="{% url 'interviews:start_interview' %}" class="nav-item" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <i class="fas fa-robot"></i> Interview AI
                </a>
                <a href="{% url 'interviews:interview_history' %}" class="nav-item" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <i class="fas fa-history"></i> History of AI
                </a>
            </nav>
            <div class="sidebar-footer">
                <form method="post" action="{% url 'users:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">
                        <span>Logout</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Applied Companies</h1>
            </div>
            <div class="placeholder-content">
                <h2>Welcome to Applied Companies</h2>
                <p>This page will show all companies where you have applied for jobs.</p>
            </div>
        </main>
    </div>
</body>
</html>
